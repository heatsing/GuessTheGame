name: CI

# Runs the full quality gate on every pull request and on every push to main.
# The deploy workflow (deploy.yml) is triggered by THIS workflow succeeding,
# so a failing check here blocks production deployment.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  quality:
    name: Typecheck · Lint · Unit tests · Content · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Frozen, reproducible install — fails if package-lock.json is out of
      # sync with package.json. This is the npm equivalent of `pnpm install
      # --frozen-lockfile` (the project standardizes on npm + package-lock.json).
      - name: Install dependencies (npm ci — frozen lockfile)
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test

      - name: Content validation
        run: npm run content:check

      # Linux CI is unaffected by the Windows NTFS phantom-file bug; the first
      # `next build` with `output: 'export'` succeeds and produces `out/`.
      - name: Production build (static export)
        run: npm run build

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: static-build
          path: out/
          retention-days: 7

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
