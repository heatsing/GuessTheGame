name: Deploy

# Production deployment is triggered ONLY after the CI workflow completes
# successfully on the master branch (the repo default branch). A failing
# typecheck/lint/test/content/build therefore blocks deployment — there is
# no path to production that bypasses the gate. Unknown branches are never
# deployed to production.
#
# Target: Cloudflare Pages (static hosting of the `out/` export directory).
on:
  workflow_run:
    workflows: [CI]
    types: [completed]

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Deploy to Cloudflare Pages (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only deploy when CI succeeded AND the run was on the master branch.
    # workflow_run events fire for every CI completion; this guard is the
    # single enforcer of "master-only production deploys".
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master'

    steps:
      - name: Checkout (at the commit CI verified)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Node 22.6+ required: content:check uses --experimental-strip-types.
          node-version: 22
          cache: npm

      - name: Install dependencies (npm ci)
        run: npm ci

      # Linux CI is unaffected by the Windows NTFS phantom-file bug; the
      # first `next build` with `output: 'export'` succeeds and produces
      # the `out/` directory consumed by Cloudflare Pages.
      - name: Production build (static export → out/)
        run: npm run build
        env:
          # Fall back to the Cloudflare Pages default domain when the variable
          # is unset; an empty-string NEXT_PUBLIC_SITE_URL would break the
          # build (site-config.ts uses `||` but we avoid the empty value
          # entirely so metadata URLs are real from the first deploy).
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://guess-the-game.pages.dev' }}

      - name: Publish to Cloudflare Pages
        id: deploy
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: guess-the-game
          directory: out
          # Production deployment (not a preview branch deploy).
          branch: master
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      # Post-release smoke test — fails the job (and signals a bad release)
      # if the deployed site does not serve the expected static content.
      - name: Smoke test
        env:
          DEPLOY_URL: ${{ steps.deploy.outputs.url }}
        run: |
          set -euo pipefail
          URL="${DEPLOY_URL}"
          echo "Smoke testing $URL"

          echo ":: [1/4] Homepage returns 200 and contains an H1"
          HOME_BODY=$(curl -sS -L -o - -w "\n%{http_code}" "$URL/")
          HOME_CODE=$(echo "$HOME_BODY" | tail -n1)
          echo "Homepage HTTP status: $HOME_CODE"
          test "$HOME_CODE" = "200"
          echo "$HOME_BODY" | grep -q "<h1" || { echo "Homepage missing H1"; exit 1; }

          echo ":: [2/4] Sitemap is reachable"
          SITEMAP_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" "$URL/sitemap.xml")
          echo "sitemap.xml HTTP status: $SITEMAP_CODE"
          test "$SITEMAP_CODE" = "200"

          echo ":: [3/4] Robots.txt is reachable"
          ROBOTS_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" "$URL/robots.txt")
          echo "robots.txt HTTP status: $ROBOTS_CODE"
          test "$ROBOTS_CODE" = "200"

          echo ":: [4/4] A play page returns 200"
          PLAY_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" "$URL/play/keywords/")
          echo "/play/keywords/ HTTP status: $PLAY_CODE"
          test "$PLAY_CODE" = "200"

          echo "Smoke test passed."
